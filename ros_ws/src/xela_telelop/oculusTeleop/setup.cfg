[develop]
script_dir=$base/lib/oculusTeleop
[install]
install_scripts=$base/lib/oculusTeleop

[flake8]
max-line-length = 99
exclude =
    .git,
    __pycache__,
    build,
    install,
    oculusTeleop/leapXela_right,
    oculusTeleop/client.py,
    oculusTeleop/quest_streamer.py,
    oculusTeleop/avp_leap_server.py,
    oculusTeleop/avp_leapXela_server.py
